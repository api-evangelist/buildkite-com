  - url: json-schema/buildkite-build-schema.json
    type: JSONSchema
  - url: json-schema/buildkite-agent-schema.json
    type: JSONSchema
  - url: json-ld/buildkite-com-context.jsonld
    type: JSONLD
  description: >-
    Programmatic access to Buildkite Pipelines covering organizations, pipelines, builds, jobs, artifacts,
    annotations, agents, clusters, queues, agent tokens, teams, pipeline templates, rules, and emojis. Uses Bearer
    token authentication with scoped API access tokens. Designed to extend, integrate, and automate CI/CD workflows
    across hybrid infrastructure.
- aid: buildkite-com:buildkite-graphql-api
  name: Buildkite GraphQL API
  tags:
  - CI/CD
  - GraphQL
  - Pipelines
  - Test Engine
  humanURL: https://buildkite.com/docs/apis/graphql-api
  baseURL: https://graphql.buildkite.com/v1
  properties:
  - url: https://buildkite.com/docs/apis/graphql-api
    type: Documentation
  - url: https://buildkite.com/docs/apis/graphql/graphql-cookbook
    type: Documentation
  - url: https://graphql.buildkite.com/explorer
    type: Sandbox
  - url: graphql/buildkite-com-graphql.md
    type: GraphQL
  description: >-
    GraphQL endpoint that returns deeply nested data on organizations, pipelines, builds, jobs, agents, clusters,
    queues, teams, audit events, suites, test executions, and package registries in a single request. Implements the
    Relay specification for pagination and supports schema introspection. Requires an API access token with "Enable
    GraphQL API Access" permission. GraphQL Portals allow scoped, schema-filtered access without per-token scopes.
- aid: buildkite-com:buildkite-agent-api
  name: Buildkite Agent API
  tags:
  - CI/CD
  - Agents
  - Hybrid CI
  humanURL: https://buildkite.com/docs/apis/agent-api
  baseURL: https://agent.buildkite.com/v3
  properties:
  - url: https://buildkite.com/docs/apis/agent-api
    type: Documentation
  - url: https://buildkite.com/docs/agent/v3
    type: Documentation
  - url: https://github.com/buildkite/agent
    type: SourceCode
  description: >-
    Backplane consumed by the Buildkite Agent (open source, Go) to register, deregister, accept and finish jobs,
    upload artifacts, stream job logs, and emit metrics for cluster autoscaling. Authenticated via Agent Tokens issued
    per cluster. Public surface includes `/metrics` (for autoscaling) and `/stacks` (for self-hosted queue
    controllers). The `agent-edge.buildkite.com` host adds gRPC methods. Most other endpoints are reserved for
    internal agent use.
- aid: buildkite-com:buildkite-webhooks
  name: Buildkite Webhooks
  tags:
  - CI/CD
  - Webhooks
  - Events
  - Notifications
  humanURL: https://buildkite.com/docs/apis/webhooks
  properties:
  - url: https://buildkite.com/docs/apis/webhooks
    type: Documentation
  - url: https://buildkite.com/docs/pipelines/integrations/notifications
    type: Documentation
  description: >-
    Outbound HTTP notifications fired in response to build, job, agent, ping, deployment, and package events across
    Pipelines, Test Engine, and Package Registries. Verified with the `X-Buildkite-Token` header. Configured per
    organization via Notification Services. Supports an expanded set of GitHub-style triggers including pull request
    reviews, releases, issue comments, and deployment status events.
- aid: buildkite-com:buildkite-mcp-server
  name: Buildkite MCP Server
  tags:
  - CI/CD
  - MCP
  - Model Context Protocol
  - AI
  - Agents
  humanURL: https://github.com/buildkite/buildkite-mcp-server
  properties:
  - url: https://github.com/buildkite/buildkite-mcp-server
    type: Documentation
  - url: https://github.com/buildkite/buildkite-mcp-server
    type: SourceCode
  - url: mcp/buildkite-com-mcp.yml
    type: MCPServer
  description: >-
    Official Model Context Protocol server that exposes Buildkite REST API surfaces (pipelines, builds, jobs, agents,
    artifacts, annotations) as MCP tools and toolsets for AI coding agents. Available as both a remote endpoint and a
    local binary. Pairs with the official Buildkite Skills for Claude Code and Cursor.
