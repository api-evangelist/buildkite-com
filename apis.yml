modified: '2026-06-20'
position: Consuming
description: >-
  Buildkite is a hybrid CI/CD platform that combines a hosted control plane (pipelines.buildkite.com) with self-hosted
  or Buildkite-Hosted agents that run jobs on customer-controlled infrastructure. The platform spans three core products
  — Pipelines, Test Engine, and Package Registries — and exposes them through a v2 REST API, a Relay-compliant GraphQL
  API at graphql.buildkite.com/v1, an Agent API at agent.buildkite.com/v3 consumed by the open-source Go agent,
  webhooks, and an official MCP server that surfaces those APIs to AI coding agents. Customers route work to specific
  agent pools through clusters and queues, define pipelines as YAML with dynamic uploads, and integrate with the major
  source control, cloud, identity, secrets, and observability vendors.
