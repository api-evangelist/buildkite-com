naftiko: 1.0.0-alpha2
info:
  label: Buildkite Pipelines
  description: Buildkite Pipelines capability covering list, get, create, update, and delete pipeline operations
    on the Buildkite REST API. Self-contained Naftiko capability covering one Buildkite business surface.
  tags:
  - Buildkite
  - Pipelines
  - CI/CD
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    BUILDKITE_API_TOKEN: BUILDKITE_API_TOKEN
    BUILDKITE_ORG_SLUG: BUILDKITE_ORG_SLUG
capability:
  consumes:
  - type: http
    namespace: pipelines
    baseUri: https://api.buildkite.com
    description: Buildkite Pipelines REST surface.
    resources:
    - name: pipelines
      path: /v2/organizations/{org}/pipelines
      operations:
      - name: listpipelines
        method: GET
        description: Buildkite List Pipelines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          required: true
          value: '{{env.BUILDKITE_ORG_SLUG}}'
      - name: createpipeline
        method: POST
        description: Buildkite Create A Pipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          required: true
          value: '{{env.BUILDKITE_ORG_SLUG}}'
        - name: body
          in: body
          type: object
          required: true
    - name: pipeline
      path: /v2/organizations/{org}/pipelines/{pipeline}
      operations:
      - name: getpipeline
        method: GET
        description: Buildkite Get A Pipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          required: true
          value: '{{env.BUILDKITE_ORG_SLUG}}'
        - name: pipeline
          in: path
          type: string
          required: true
      - name: updatepipeline
        method: PATCH
        description: Buildkite Update A Pipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: path
          type: string
          required: true
          value: '{{env.BUILDKITE_ORG_SLUG}}'
        - name: pipeline
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletepipeline
        method: DELETE
        description: Buildkite Delete A Pipeline
        inputParameters:
        - name: org
          in: path
          type: string
          required: true
          value: '{{env.BUILDKITE_ORG_SLUG}}'
        - name: pipeline
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.BUILDKITE_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: pipelines-rest
    port: 8080
    description: REST adapter for Buildkite Pipelines.
    resources:
    - path: /v2/pipelines
      name: pipelines
      description: REST surface for Buildkite pipelines.
      operations:
      - method: GET
        name: listpipelines
        description: Buildkite List Pipelines
        call: pipelines.listpipelines
      - method: POST
        name: createpipeline
        description: Buildkite Create A Pipeline
        call: pipelines.createpipeline
        with:
          body: rest.body
      - method: GET
        name: getpipeline
        path: /v2/pipelines/{pipeline}
        call: pipelines.getpipeline
        with:
          pipeline: rest.path.pipeline
      - method: PATCH
        name: updatepipeline
        path: /v2/pipelines/{pipeline}
        call: pipelines.updatepipeline
        with:
          pipeline: rest.path.pipeline
          body: rest.body
      - method: DELETE
        name: deletepipeline
        path: /v2/pipelines/{pipeline}
        call: pipelines.deletepipeline
        with:
          pipeline: rest.path.pipeline
  - type: mcp
    namespace: pipelines-mcp
    port: 9090
    transport: http
    description: MCP adapter for Buildkite Pipelines. One tool per consumed operation.
    tools:
    - name: buildkite-list-pipelines
      description: Buildkite List Pipelines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipelines.listpipelines
    - name: buildkite-create-pipeline
      description: Buildkite Create A Pipeline
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pipelines.createpipeline
      with:
        body: tools.body
    - name: buildkite-get-pipeline
      description: Buildkite Get A Pipeline
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pipelines.getpipeline
      with:
        pipeline: tools.pipeline
    - name: buildkite-update-pipeline
      description: Buildkite Update A Pipeline
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pipelines.updatepipeline
      with:
        pipeline: tools.pipeline
        body: tools.body
    - name: buildkite-delete-pipeline
      description: Buildkite Delete A Pipeline
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: pipelines.deletepipeline
      with:
        pipeline: tools.pipeline
