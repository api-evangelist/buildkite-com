generated: '2026-06-20'
method: searched
source: https://github.com/buildkite
description: >-
  First-party Buildkite client libraries, SDKs, and installable tools, verified
  against the Buildkite GitHub organization and public package registries. Buildkite
  ships primarily Go tooling (the agent, the CLI, the REST SDK, the pipeline DSL);
  the MCP server is distributed as a container image and Go binary rather than a
  language-registry package. Registry HTTP status recorded at fetch time.
packages:
