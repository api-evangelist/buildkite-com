    registry: pkg.go.dev
    name: github.com/buildkite/go-buildkite/v5
    url: https://pkg.go.dev/github.com/buildkite/go-buildkite/v5
    source: https://github.com/buildkite/go-buildkite
    install: go get github.com/buildkite/go-buildkite/v5
    official: true
    note: Go client library for the Buildkite REST API (current major v5).
  - language: go
    registry: pkg.go.dev
    name: github.com/buildkite/go-pipeline
    url: https://pkg.go.dev/github.com/buildkite/go-pipeline
    source: https://github.com/buildkite/go-pipeline
    install: go get github.com/buildkite/go-pipeline
    official: true
    note: Go library for parsing and representing Buildkite pipeline YAML.
  - language: go
    registry: github
    name: buildkite/agent
    url: https://github.com/buildkite/agent
    source: https://github.com/buildkite/agent
    install: "curl -sL https://raw.githubusercontent.com/buildkite/agent/main/install.sh | bash"
    official: true
    note: Open-source Buildkite Agent (Go); also distributed via apt/yum, Homebrew, Docker, and Chocolatey.
  - language: go
    registry: github
    name: buildkite/cli
    url: https://github.com/buildkite/cli
    source: https://github.com/buildkite/cli
    install: "brew install buildkite/buildkite/bk"
    official: true
    note: The bk command-line interface. See cli/buildkite-com-cli.yml for the command surface.
  - language: go
    registry: github
    name: buildkite/buildkite-mcp-server
    url: https://github.com/buildkite/buildkite-mcp-server
    source: https://github.com/buildkite/buildkite-mcp-server
    install: "docker pull ghcr.io/buildkite/buildkite-mcp-server"
    official: true
    note: Official MCP server (Go binary + Chainguard container). See mcp/buildkite-com-mcp.yml.
  - language: json-schema
    registry: github
    name: buildkite/pipeline-schema
    url: https://github.com/buildkite/pipeline-schema
    source: https://github.com/buildkite/pipeline-schema
